name: Scrape latest data

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
  - cron: '0 */6 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: scrape-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scheduled:
    runs-on: ubuntu-latest
    steps:
    - name: Check out this repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
    - name: CMTEB Termoficare București
      run: |-
        python cmteb.py
      continue-on-error: true
    - name: ANDNET Situație Drumuri map
      run: |-
        python andnet-harta.py    
      continue-on-error: true
    - name: ANDNET Situație Drumuri list
      run: |-
        python andnet-tables.py    
      continue-on-error: true
    - name: sesizări BV
      run: |-
        python brasov-sesizari.py
      continue-on-error: true
    - name: pârtii BV
      run: |-
        python stare-partii-bv.py
      continue-on-error: true
    - name: instalații BV
      run: |-
        python instalatii-partie-bv.py
      continue-on-error: true
    - name: avarii PMB
      run: |-
        python pmb-avarii.py
      continue-on-error: true
    - name: iasi calitate aer
      run: |-
        python iasi-calitate-aer.py
      continue-on-error: true
    - name: infoaer PMB București
      run: |-
        python infoaer-bucuresti.py
      continue-on-error: true
    # - name: aerlive bucuresti
    #   run: |-
    #     python aerlive-bucuresti.py
    #   continue-on-error: true
    # - name: aerlive cj
    #   run: |-
    #     python aerlive-cj.py
    #   continue-on-error: true
    - name: Curs valutar BNR
      run: |-
        python curs-valutar.py
      continue-on-error: true
    - name: Trafic Frontieră map
      run: |-
        python trafic-frontiere-markers.py
      continue-on-error: true
    - name: Trafic Frontieră list
      run: |-
        python trafic-frontiere-list.py
      continue-on-error: true
    - name: Intervenții Urs (Bear Interventions)
      run: |-
        python interventii-urs.py
      continue-on-error: true
    - name: Normalise bear interventions CSV
      run: |-
        python utils/normalise-urs.py
      continue-on-error: true
    # - name: DEER incidente
    #   run: |-
    #     python deer-incidente.py
    #   continue-on-error: true
    - name: întreruperi distribuție e-distributie Enel
      run: |-
        python enel-intreruperi.py
      continue-on-error: true
    # - name: DEER întreruperi
    #   run: |-
    #     python deer-intreruperi.py
    #   continue-on-error: true
    # - name: posturi.gov.ro
    #   run: |-
    #     python posturi-fetch-index.py
    # continue-on-error: true
    # - name: SUMAL - Inspectorul Pădurii
    #   run: |-
    #     python sumal-inspectorul-padurii.py
    #   continue-on-error: true
    - name: Commit and create PR if data changed
      env:
        GH_TOKEN: ${{ github.token }}
      run: |-
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data/
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git commit -m "Latest data: $(date -u)"
        git push origin HEAD:auto/scraped-data --force
        gh pr create \
          --title "Latest scraped data" \
          --body "Automated data scraping update from workflow run." \
          --base main \
          --head auto/scraped-data \
        || echo "PR already exists or creation skipped"
