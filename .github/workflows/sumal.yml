name: SUMAL - Inspectorul Pădurii

on:
  workflow_dispatch:
  schedule:
  - cron: '0 6 * * 1'  # weekly, Monday 6am UTC

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sumal-scrape
  cancel-in-progress: true

jobs:
  sumal:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - name: Check out this repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install Python dependencies
      run: pip install -r requirements.txt
    - name: SUMAL - Inspectorul Pădurii
      run: python sumal-inspectorul-padurii.py
      continue-on-error: true
    - name: Commit and create PR if data changed
      env:
        GH_TOKEN: ${{ github.token }}
      run: |-
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data/sumal/
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git commit -m "SUMAL data update: $(date -u)"
        git push origin HEAD:auto/sumal-data --force
        gh pr create \
          --title "SUMAL scraped data update" \
          --body "Automated SUMAL / Inspectorul Pădurii data update." \
          --base main \
          --head auto/sumal-data \
        || echo "PR already exists or creation skipped"
